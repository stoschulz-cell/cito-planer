<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cito Care Planer Zentrale</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-7xl mx-auto">
        <div class="bg-blue-700 p-4 rounded-t-xl text-white flex justify-between items-center shadow-lg">
            <h1 class="text-xl font-bold">Cito Care Zentrale</h1>
            <div class="flex gap-2">
                <button id="btn-freigabe" onclick="toggleFreigabe()" class="px-3 py-1 rounded text-sm font-semibold"></button>
                <button onclick="window.location.href='index.html'" class="bg-red-500 px-3 py-1 rounded text-sm font-semibold">Abmelden</button>
            </div>
        </div>
        
        <div class="bg-white p-6 rounded-b-xl shadow-lg grid grid-cols-1 md:grid-cols-4 gap-8">
            <div class="md:col-span-1 border-r pr-4">
                <h2 class="text-lg font-bold mb-4 text-blue-800 border-b pb-2">Mitarbeiter</h2>
                <div id="mitarbeiter-liste-sidebar" class="space-y-2 mb-6"></div>
                
                <h2 class="text-lg font-bold mt-8 mb-4 text-yellow-800 border-b pb-2">Eingegangene Wünsche</h2>
                <div id="wunsch-liste-sidebar" class="space-y-2 mb-6 text-sm"></div>

                <h2 class="text-lg font-bold mt-8 mb-4 text-green-800 border-b pb-2">Neuer Termin</h2>
                <div class="bg-gray-50 p-3 rounded border text-sm">
                    <select id="termin-ma" class="w-full border p-2 mb-2 rounded"></select>
                    <input id="termin-kunde" placeholder="Kunde" class="w-full border p-2 mb-2 rounded">
                    <input id="termin-datum" type="date" class="w-full border p-2 mb-2 rounded">
                    <div class="flex gap-2 mb-2">
                        <input id="termin-von" type="time" class="w-full border p-2 rounded">
                        <input id="termin-bis" type="time" class="w-full border p-2 rounded">
                    </div>
                    <button onclick="terminAnlegen()" class="bg-green-600 text-white w-full py-2 rounded font-bold">Speichern</button>
                </div>
            </div>

            <div class="md:col-span-3">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="wocheBlaettern(-1)" class="bg-gray-200 px-4 py-2 rounded text-sm font-bold">« Vorherige</button>
                    <h2 id="kw-titel" class="font-bold text-xl text-blue-900"></h2>
                    <button onclick="wocheBlaettern(1)" class="bg-gray-200 px-4 py-2 rounded text-sm font-bold">Nächste »</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full border-collapse border shadow-sm">
                        <thead><tr id="table-header" class="bg-blue-50 text-left text-xs uppercase text-blue-900"></tr></thead>
                        <tbody id="matrix-body" class="bg-white"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ... (Deine bestehenden Funktionen bleiben unverändert)

        async function ladeDashboard() {
            const res = await fetch('/api/planer/dashboard');
            const d = await res.json();
            
            // Wünsche laden (Annahme: /api/planer/wuensche liefert die Liste)
            const wRes = await fetch('/api/planer/wuensche');
            const wuensche = await wRes.json();
            
            // Wünsche anzeigen
            document.getElementById('wunsch-liste-sidebar').innerHTML = (wuensche || []).map(w => `
                <div class="p-2 bg-yellow-50 rounded border border-yellow-200">
                    <p class="font-bold">${w.mitarbeiter}</p>
                    <p>${w.datum} | ${w.grund}</p>
                    <button onclick="wunschBestaetigen('${w.id}')" class="bg-green-600 text-white w-full mt-2 py-1 rounded text-xs">Als Termin übernehmen</button>
                </div>`).join('');

            // ... (Rest deines Lade-Codes für Mitarbeiter/Tabelle)
        }

        async function wunschBestaetigen(id) {
            await fetch('/api/planer/wunsch/bestaetigen', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ id }) 
            });
            ladeDashboard();
        }
        
        // ... (Deine restlichen Funktionen: terminAnlegen, terminLoeschen etc.)
        window.onload = ladeDashboard;
    </script>
</body>
</html>
