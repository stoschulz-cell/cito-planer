<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cito Care Planer Zentrale</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-7xl mx-auto">
        <div class="bg-blue-700 p-4 rounded-t-xl text-white flex justify-between items-center">
            <h1 class="text-xl font-bold">Cito Care Zentrale</h1>
            <button onclick="window.location.href='index.html'" class="bg-red-500 px-3 py-1 rounded text-sm hover:bg-red-600">Abmelden</button>
        </div>
        
        <div class="bg-white p-6 rounded-b-xl shadow grid grid-cols-4 gap-6">
            <div class="col-span-1 border-r">
                <h3 class="font-bold mb-4">Mitarbeiter</h3>
                <div id="mitarbeiter-liste-sidebar" class="space-y-2"></div>
                <div class="mt-6 border-t pt-4">
                    <input id="new-ma" placeholder="Neuer Name" class="border p-2 w-full text-sm rounded mb-2">
                    <button onclick="mitarbeiterAnlegen()" class="bg-blue-600 text-white w-full py-2 rounded text-sm hover:bg-blue-700">Anlegen</button>
                </div>

                <div class="mt-8 border-t pt-4">
                    <h3 class="font-bold mb-2">Termin eintragen</h3>
                    <select id="termin-ma" class="w-full border p-2 mb-2 text-sm rounded"></select>
                    <input id="termin-kunde" placeholder="Kunde" class="w-full border p-2 mb-2 text-sm rounded">
                    <input id="termin-datum" type="date" class="w-full border p-2 mb-2 text-sm rounded">
                    <div class="flex gap-2 mb-2">
                        <input id="termin-von" type="time" class="w-full border p-2 text-sm rounded">
                        <input id="termin-bis" type="time" class="w-full border p-2 text-sm rounded">
                    </div>
                    <button onclick="terminAnlegen()" class="bg-green-600 text-white w-full py-2 rounded text-sm hover:bg-green-700">Speichern</button>
                </div>
            </div>

            <div class="col-span-3">
                <h3 class="font-bold mb-4">Dienstplan-Matrix</h3>
                <table class="w-full border-collapse border">
                    <thead>
                        <tr class="bg-gray-100 text-left">
                            <th class="p-2 border">Mitarbeiter</th>
                            <th class="p-2 border">Mo</th><th class="p-2 border">Di</th>
                            <th class="p-2 border">Mi</th><th class="p-2 border">Do</th>
                            <th class="p-2 border">Fr</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function ladeDashboard() {
            const res = await fetch('/api/planer/dashboard');
            const d = await res.json();
            
            // Sidebar rendern
            document.getElementById('mitarbeiter-liste-sidebar').innerHTML = d.mitarbeiterListe.map(m => `
                <div class="flex justify-between items-center text-sm p-2 border-b">
                    <span>${m.name}</span>
                    <button onclick="mitarbeiterLoeschen('${m.name}')" class="text-red-500 font-bold">✕</button>
                </div>
            `).join('');

            // Dropdown für Termin-MA füllen
            document.getElementById('termin-ma').innerHTML = d.mitarbeiterListe.map(m => 
                `<option value="${m.name}">${m.name}</option>`).join('');

            // Matrix rendern
            document.getElementById('matrix-body').innerHTML = d.mitarbeiterListe.map(m => `
                <tr>
                    <td class="p-2 border font-medium">${m.name}</td>
                    <td class="p-2 border">-</td><td class="p-2 border">-</td>
                    <td class="p-2 border">-</td><td class="p-2 border">-</td>
                    <td class="p-2 border">-</td>
                </tr>
            `).join('');
        }

        async function mitarbeiterAnlegen() {
            const name = document.getElementById('new-ma').value;
            if(!name) return;
            await fetch('/api/planer/mitarbeiter', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name }) });
            document.getElementById('new-ma').value = '';
            ladeDashboard();
        }

        async function mitarbeiterLoeschen(name) {
            if(confirm(`Wirklich ${name} löschen?`)) {
                await fetch(`/api/planer/mitarbeiter/${name}`, { method: 'DELETE' });
                ladeDashboard();
            }
        }

        async function terminAnlegen() {
            const termin = {
                mitarbeiter: document.getElementById('termin-ma').value,
                kunde: document.getElementById('termin-kunde').value,
                datum: document.getElementById('termin-datum').value,
                von_uhrzeit: document.getElementById('termin-von').value,
                bis_uhrzeit: document.getElementById('termin-bis').value
            };
            await fetch('/api/planer/termin', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify(termin) 
            });
            alert("Termin gespeichert!");
            ladeDashboard();
        }

        window.onload = ladeDashboard;
    </script>
</body>
</html>
