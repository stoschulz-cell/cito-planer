<script>
    const API_URL = "/api";
    let fokusDatum = new Date();
    let ansichtsModus = "PLAN";

    window.setAnsichtsModus = function(modus) {
        ansichtsModus = modus;
        window.ladeDashboard();
    };

    function getWochenDaten(basisDatum) {
        const dCopy = new Date(basisDatum);
        const tag = dCopy.getDay();
        const diff = dCopy.getDate() - tag + (tag === 0 ? -6 : 1);
        const montag = new Date(dCopy.setDate(diff));
        let tage = [];
        for(let i=0; i<7; i++) {
            const d = new Date(montag); d.setDate(montag.getDate() + i);
            tage.push(d.toISOString().split('T')[0]);
        }
        return tage;
    }

    window.wocheWechseln = function(diff) {
        fokusDatum.setDate(fokusDatum.getDate() + diff);
        window.ladeDashboard();
    };

    // NEU: Verschiebe-Funktion für Mitarbeiter
    window.terminVerschiebenPrompt = async function(id) {
        const neuesDatum = prompt("Neues Datum (YYYY-MM-DD):", new Date().toISOString().split('T')[0]);
        const neueVon = prompt("Neue Startzeit (HH:MM):", "08:00");
        const neueBis = prompt("Neue Endzeit (HH:MM):", "10:00");
        
        if(neuesDatum && neueVon && neueBis) {
            await fetch(`${API_URL}/planer/verschieben`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ terminId: id, neuesDatum, neueVon, neueBis })
            });
            window.ladeDashboard();
        }
    };

    window.ladeDashboard = async function() {
        const wochenTage = getWochenDaten(fokusDatum);
        document.getElementById('kw-anzeige').innerText = "Planungswoche vom " + wochenTage[0];
        
        ['mo','di','mi','do','fr','sa','so'].forEach((id, i) => {
            const tageNamen = ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"];
            document.getElementById(`th-${id}`).innerHTML = `${tageNamen[i]}<br><span class="font-normal text-[10px] text-gray-400">${wochenTage[i].split('-')[2]}.${wochenTage[i].split('-')[1]}.</span>`;
        });

        const antwort = await fetch(`${API_URL}/planer/dashboard`);
        const daten = await antwort.json();

        // UI Updates
        document.getElementById('form-ma').innerHTML = daten.mitarbeiter.map(m => `<option value="${m}">${m}</option>`).join('');
        document.getElementById('mitarbeiter-liste-sidebar').innerHTML = daten.mitarbeiter.map(m => `
            <div class="p-2 bg-gray-50 rounded-xl text-xs font-bold flex justify-between items-center border border-gray-100">
                <span>${m}</span>
                <button onclick="window.mitarbeiterLoeschen('${m}')" class="text-red-500">✕</button>
            </div>`).join('');

        // Matrix befüllen (Hier bleibt die Reihenfolge der Mitarbeiter fix)
        const matrixBody = document.getElementById('matrix-body');
        matrixBody.innerHTML = "";

        daten.mitarbeiter.forEach(m => {
            let row = document.createElement('tr');
            row.className = "border-b";
            row.innerHTML = `<td class="p-3 font-bold border-r bg-gray-50 sticky left-0 z-10">${m}</td>`;

            wochenTage.forEach(tag => {
                let cell = document.createElement('td');
                cell.className = "p-2 border-r min-w-[150px] align-top";
                
                const termineFuerTag = daten.termine.filter(t => t.mitarbeiter === m && t.datum === tag);
                termineFuerTag.forEach(t => {
                    if ((ansichtsModus === "PLAN" && t.status !== 'IST-ZEIT') || (ansichtsModus === "IST" && t.status !== 'ORIGINAL_GEÄNDERT')) {
                        let statusColor = t.status === 'IST-ZEIT' ? 'bg-orange-100 border-orange-400' : 'bg-blue-50 border-blue-200';
                        cell.innerHTML += `
                            <div class="border rounded-lg p-2 mb-2 text-[11px] cursor-pointer hover:bg-yellow-50 ${statusColor}" 
                                 onclick="window.terminVerschiebenPrompt(${t.id})">
                                <div class="font-bold">${t.von_uhrzeit} - ${t.bis_uhrzeit}</div>
                                <div>${t.kunde}</div>
                            </div>`;
                    }
                });
                row.appendChild(cell);
            });
            matrixBody.appendChild(row);
        });
    };

    // Standard-Funktionen
    window.mitarbeiterLoeschen = async function(name) { await fetch(`${API_URL}/planer/mitarbeiter/${encodeURIComponent(name)}`, { method: 'DELETE' }); window.ladeDashboard(); };
    window.terminLoeschen = async function(id) { await fetch(`${API_URL}/planer/termin/${id}`, { method: 'DELETE' }); window.ladeDashboard(); };
    window.mitarbeiterAnlegen = async function() { const name = document.getElementById('ma-name').value; await fetch(`${API_URL}/planer/mitarbeiter`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ name }) }); window.ladeDashboard(); };
    window.terminAnlegen = async function() {
        const mitarbeiter = document.getElementById('form-ma').value; const kunde = document.getElementById('form-kunde').value;
        const datum = document.getElementById('form-datum').value; const von = document.getElementById('form-von').value; const bis = document.getElementById('form-bis').value;
        await fetch(`${API_URL}/planer/termin`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ mitarbeiter, kunde, datum, von_uhrzeit: von, bis_uhrzeit: bis }) });
        window.ladeDashboard();
    };
    window.terminFreigeben = async function() { await fetch(`${API_URL}/planer/freigeben`, { method: 'POST' }); window.ladeDashboard(); };
    window.ladeDashboard();
</script>
