<!DOCTYPE html>
<html lang="de">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md w-96">
        <h2 class="text-xl font-bold mb-4">Cito Care Anmeldung</h2>
        <input id="name" placeholder="Name" class="w-full border p-2 mb-2 rounded">
        <input id="pass" type="password" placeholder="Passwort" class="w-full border p-2 mb-4 rounded">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">Login</button>
    </div>
    <script>
    async function login() {
    const name = document.getElementById('name').value;
    const passwort = document.getElementById('pass').value;

    const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' }, // WICHTIG!
        body: JSON.stringify({ name, passwort })        // WICHTIG!
    });
    
    const data = await res.json();
    if (res.ok) { // Prüft, ob Status 200 zurückkam
        window.location.href = data.role === 'planer' ? 'planer.html' : 'mitarbeiter.html';
    } else {
        alert("Login fehlgeschlagen: " + (data.error || "Unbekannter Fehler"));
    }
}
    </script>
</body>
</html>
