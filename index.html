<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cito Care - Planer Zentrale</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans p-4 space-y-6">

    <div class="bg-blue-600 p-4 rounded-2xl text-white shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black tracking-wide">Cito Care Zentrale</h1>
            <p class="text-xs opacity-80">Einsatzplanung & Dokumentation</p>
        </div>
        <button onclick="window.terminFreigeben()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-4 py-2 rounded-xl shadow text-sm cursor-pointer">
            Woche freigeben 🚀
        </button>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
        <h2 class="text-sm font-black text-gray-700 flex items-center gap-1">📨 Offene Wunschfrei-Anträge</h2>
        <div id="antraege-liste" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-4 gap-4">
        <div class="space-y-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider">Team</h3>
                <div class="flex gap-1">
                    <input type="text" id="ma-name" placeholder="Name..." class="p-2 border rounded-xl text-xs w-full">
                    <button onclick="window.mitarbeiterAnlegen()" class="bg-blue-600 text-white px-3 py-2 rounded-xl text-xs font-bold cursor-pointer">+</button>
                </div>
                <div id="mitarbeiter-liste-sidebar" class="space-y-1"></div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <h3 class="text-xs font-bold text-purple-600 uppercase tracking-wider">🔮 Klienten-Pool</h3>
                <div id="klienten-pool-liste" class="space-y-2"></div>
            </div>
        </div>

        <div class="xl:col-span-3 bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-4">
            <div class="flex items-center gap-4">
                <button onclick="window.wocheWechseln(-7)" class="p-2 bg-gray-50 rounded-xl font-bold cursor-pointer">◀</button>
                <span id="kw-anzeige" class="text-sm font-black text-gray-700">Lade...</span>
                <button onclick="window.wocheWechseln(7)" class="p-2 bg-gray-50 rounded-xl font-bold cursor-pointer">▶</button>
            </div>
            
            <table class="w-full text-left text-xs border-collapse">
                <thead id="matrix-head"></thead>
                <tbody id="matrix-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "/api";
        let fokusDatum = new Date();
        window.ladeDashboard = async function() {
            const res = await fetch(`${API_URL}/planer/dashboard`);
            const daten = await res.json();
            // Hier würde die Logik stehen, die wir oben in deiner Datei hatten
            // (Mitarbeiter-Liste füllen, Matrix rendern, Pool rendern...)
            console.log("Daten erhalten:", daten);
        };
        window.ladeDashboard();
    </script>
</body>
</html>
