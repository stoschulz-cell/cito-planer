<script>
    const API_URL = "/api";
    let fokusDatum = new Date();

    function getWochenDaten(basisDatum) {
        const dCopy = new Date(basisDatum);
        const tag = dCopy.getDay();
        const diff = dCopy.getDate() - tag + (tag === 0 ? -6 : 1);
        const montag = new Date(dCopy.setDate(diff));
        let tage = [];
        for(let i=0; i<7; i++) {
            const d = new Date(montag); d.setDate(montag.getDate() + i);
            tage.push(d.toISOString().split('T')[0]);
        }
        return tage;
    }

    window.mitarbeiterVerschieben = async function(index, richtung) {
        const antwort = await fetch(`${API_URL}/planer/dashboard`);
        const daten = await antwort.json();
        let liste = daten.mitarbeiter;
        const zielIndex = index + richtung;
        if (zielIndex >= 0 && zielIndex < liste.length) {
            let temp = liste[index];
            liste[index] = liste[zielIndex];
            liste[zielIndex] = temp;
            await fetch(`${API_URL}/planer/mitarbeiter/update-order`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ neueListe: liste })
            });
            window.ladeDashboard();
        }
    };

    window.ladeDashboard = async function() {
        const antwort = await fetch(`${API_URL}/planer/dashboard`);
        const daten = await antwort.json();
        const wochenTage = getWochenDaten(fokusDatum);

        document.getElementById('mitarbeiter-liste-sidebar').innerHTML = daten.mitarbeiter.map((m, index) => `
            <div class="p-2 bg-gray-50 rounded-xl text-xs font-bold flex justify-between items-center border border-gray-100">
                <span>${m}</span>
                <div class="flex gap-1">
                    <button onclick="window.mitarbeiterVerschieben(${index}, -1)" class="cursor-pointer">▲</button>
                    <button onclick="window.mitarbeiterVerschieben(${index}, 1)" class="cursor-pointer">▼</button>
                    <button onclick="window.mitarbeiterLoeschen('${m}')" class="text-red-500">✕</button>
                </div>
            </div>`).join('');

        const matrixBody = document.getElementById('matrix-body');
        matrixBody.innerHTML = "";
        
        daten.mitarbeiter.forEach(m => {
            let row = document.createElement('tr');
            row.innerHTML = `<td class="p-3 font-bold border-r bg-gray-50 sticky left-0 z-10">${m}</td>`;
            wochenTage.forEach(tag => {
                let cell = document.createElement('td');
                cell.className = "p-2 border-r min-w-[150px] align-top";
                daten.termine.filter(t => t.mitarbeiter === m && t.datum === tag).forEach(t => {
                    cell.innerHTML += `<div class="bg-blue-50 p-2 mb-1 rounded text-[10px] cursor-pointer" onclick="window.terminVerschiebenPrompt(${t.id})">${t.kunde}</div>`;
                });
                row.appendChild(cell);
            });
            matrixBody.appendChild(row);
        });
    };

    window.mitarbeiterLoeschen = async function(name) {
        await fetch(`${API_URL}/planer/mitarbeiter/${encodeURIComponent(name)}`, { method: 'DELETE' });
        window.ladeDashboard();
    };

    window.terminVerschiebenPrompt = async function(id) {
        const neuesDatum = prompt("Datum (YYYY-MM-DD):");
        const neueVon = prompt("Start:");
        const neueBis = prompt("Ende:");
        if(neuesDatum) {
            await fetch(`${API_URL}/planer/verschieben`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ terminId: id, neuesDatum, neueVon, neueBis })
            });
            window.ladeDashboard();
        }
    };

    window.ladeDashboard();
</script>
