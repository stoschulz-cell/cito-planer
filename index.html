<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cito Care Zentrale</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">

    <div id="login-view" class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h2 class="text-lg font-bold mb-4">Anmeldung</h2>
        <input id="nameInput" placeholder="Dein Name" class="border p-2 w-full mb-4">
        <button onclick="login()" class="bg-blue-600 text-white w-full p-2 rounded">Login</button>
    </div>

    <div id="planer-view" class="hidden">
        <div class="bg-blue-700 p-4 rounded-t-xl text-white">
            <h1 class="text-xl font-bold">Cito Care Zentrale</h1>
            <p class="text-xs opacity-80">Einsatzplanung & Dokumentation</p>
        </div>
        
        <div class="bg-white p-4 shadow rounded-b-xl">
            <div class="flex items-center gap-4 mb-4">
                <button onclick="wocheWechseln(-7)" class="bg-gray-200 px-3 py-1 rounded">◀</button>
                <span id="kw-anzeige" class="font-bold">Woche...</span>
                <button onclick="wocheWechseln(7)" class="bg-gray-200 px-3 py-1 rounded">▶</button>
                <button onclick="location.reload()" class="ml-auto bg-red-500 text-white px-3 py-1 rounded text-sm">Abmelden</button>
            </div>

            <table class="w-full border-collapse">
                <thead>
                    <tr class="bg-gray-100">
                        <th class="p-3 border">Mitarbeiter</th>
                        <th class="p-3 border">Termine</th>
                    </tr>
                </thead>
                <tbody id="matrix-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let fokusDatum = new Date();

        async function login() {
            const name = document.getElementById('nameInput').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name })
            });

            if (res.ok) {
                const data = await res.json();
                document.getElementById('login-view').classList.add('hidden');
                if (data.role === 'planer') {
                    document.getElementById('planer-view').classList.remove('hidden');
                    ladeDashboard();
                } else {
                    alert("Nur für Planer verfügbar.");
                }
            }
        }

        async function ladeDashboard() {
            const res = await fetch('/api/planer/dashboard');
            const daten = await res.json();
            document.getElementById('kw-anzeige').innerText = "Woche " + getKW(fokusDatum);
            
            const matrixBody = document.getElementById('matrix-body');
            matrixBody.innerHTML = daten.mitarbeiter.map(m => {
                const termine = (daten.termine || []).filter(t => t.mitarbeiter === m);
                return `<tr>
                    <td class="p-3 border font-bold">${m}</td>
                    <td class="p-3 border">${termine.map(t => `<span class="bg-blue-100 px-2 py-1 rounded text-xs">${t.kunde}</span>`).join(' ')}</td>
                </tr>`;
            }).join('');
        }

        function wocheWechseln(tage) {
            fokusDatum.setDate(fokusDatum.getDate() + tage);
            ladeDashboard();
        }

        function getKW(d) {
            let t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            t.setUTCDate(t.getUTCDate() + 4 - (t.getUTCDay() || 7));
            let jahr = new Date(Date.UTC(t.getUTCFullYear(), 0, 1));
            return Math.ceil((((t - jahr) / 86400000) + 1) / 7);
        }
    </script>
</body>
</html>
