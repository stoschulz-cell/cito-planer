<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cito Care Planer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">

    <div id="login-view" class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h2 class="text-lg font-bold mb-4">Anmeldung</h2>
        <input id="nameInput" placeholder="Dein Name" class="border p-2 w-full mb-4">
        <button onclick="login()" class="bg-blue-600 text-white w-full p-2 rounded">Login</button>
    </div>

    <div id="planer-view" class="hidden">
        <h1 class="text-2xl font-bold mb-4">Planer Dashboard</h1>
        <div id="mitarbeiter-liste-sidebar" class="grid gap-2 mb-4"></div>
        <table class="w-full bg-white shadow rounded">
            <tbody id="matrix-body"></tbody>
        </table>
    </div>

    <div id="mitarbeiter-view" class="hidden">
        <h1 class="text-2xl font-bold mb-4">Meine Termine</h1>
        <div id="meine-termine"></div>
    </div>

    <script>
        const API_URL = "/api";

        async function login() {
            const name = document.getElementById('nameInput').value;
            const res = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name })
            });

            if (res.ok) {
                const data = await res.json();
                document.getElementById('login-view').classList.add('hidden');
                
                if (data.role === 'planer') {
                    document.getElementById('planer-view').classList.remove('hidden');
                    window.ladeDashboard(); 
                } else {
                    document.getElementById('mitarbeiter-view').classList.remove('hidden');
                }
            } else {
                alert("Name nicht im System gefunden.");
            }
        }

        window.ladeDashboard = async function() {
            try {
                const antwort = await fetch(`${API_URL}/planer/dashboard`);
                const daten = await antwort.json();
                
                // Sidebar Mitarbeiter
                const sidebar = document.getElementById('mitarbeiter-liste-sidebar');
                if(sidebar && daten.mitarbeiter) {
                    sidebar.innerHTML = daten.mitarbeiter.map(m => `
                        <div class="p-2 bg-white rounded border">${m}</div>`).join('');
                }

                // Tabelle Matrix
                const matrixBody = document.getElementById('matrix-body');
                if(matrixBody && daten.mitarbeiter) {
                    matrixBody.innerHTML = daten.mitarbeiter.map(m => `
                        <tr><td class="p-3 border font-bold">${m}</td><td class="p-3 border text-gray-500">Keine Termine</td></tr>`).join('');
                }
            } catch (e) { console.error("Fehler beim Laden:", e); }
        };
    </script>
</body>
</html>
