<script>
    const API_URL = "/api";
    let fokusDatum = new Date();
    let ansichtsModus = "PLAN";

    window.ladeDashboard = async function() {
        const antwort = await fetch(`${API_URL}/planer/dashboard`);
        const daten = await antwort.json();
        const wochenTage = getWochenDaten(fokusDatum);

        // Sidebar & Dropdown füllen
        document.getElementById('form-ma').innerHTML = daten.mitarbeiter.map(m => `<option value="${m}">${m}</option>`).join('');
        document.getElementById('mitarbeiter-liste-sidebar').innerHTML = daten.mitarbeiter.map(m => `
            <div class="p-2 bg-gray-50 rounded-xl text-xs font-bold flex justify-between items-center border border-gray-100">
                <span>${m}</span>
                <button onclick="window.mitarbeiterLoeschen('${m}')" class="text-red-500">✕</button>
            </div>`).join('');

        const matrixBody = document.getElementById('matrix-body');
        matrixBody.innerHTML = "";

        // Mitarbeiter-Zeilen stabil zeichnen
        daten.mitarbeiter.forEach(m => {
            let row = document.createElement('tr');
            row.className = "border-b";
            row.innerHTML = `<td class="p-3 font-bold border-r bg-gray-50 sticky left-0 z-10">${m}</td>`;

            wochenTage.forEach(tag => {
                let cell = document.createElement('td');
                cell.className = "p-2 border-r min-w-[150px] align-top";
                
                daten.termine.filter(t => t.mitarbeiter === m && t.datum === tag).forEach(t => {
                    if ((ansichtsModus === "PLAN" && t.status !== 'IST-ZEIT') || (ansichtsModus === "IST" && t.status !== 'ORIGINAL_GEÄNDERT')) {
                        cell.innerHTML += `
                            <div class="border rounded-lg p-2 mb-2 text-[11px] cursor-pointer bg-blue-50" onclick="window.terminVerschiebenPrompt(${t.id})">
                                <strong>${t.von_uhrzeit}</strong><br>${t.kunde}
                            </div>`;
                    }
                });
                row.appendChild(cell);
            });
            matrixBody.appendChild(row);
        });
    };

    window.terminVerschiebenPrompt = async function(id) {
        const neuesDatum = prompt("Neues Datum (YYYY-MM-DD):", "2026-06-15");
        const neueVon = prompt("Neue Startzeit:", "08:00");
        const neueBis = prompt("Neue Endzeit:", "10:00");
        if(neuesDatum) {
            await fetch(`${API_URL}/planer/verschieben`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ terminId: id, neuesDatum, neueVon, neueBis })
            });
            window.ladeDashboard();
        }
    };
    
    // Hilfsfunktionen beibehalten...
    window.ladeDashboard();
</script>
