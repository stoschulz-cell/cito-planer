<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cito Care Planer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">

    <div id="login-view" class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h2 class="text-lg font-bold mb-4">Anmeldung</h2>
        <input id="nameInput" placeholder="Dein Name" class="border p-2 w-full mb-4">
        <button onclick="login()" class="bg-blue-600 text-white w-full p-2 rounded">Login</button>
    </div>

    <div id="planer-view" class="hidden">
        <h1 class="text-2xl font-bold mb-4">Planer Dashboard</h1>
        <table class="w-full bg-white shadow rounded border-collapse">
            <thead>
                <tr class="bg-gray-200">
                    <th class="p-3 border">Mitarbeiter</th>
                    <th class="p-3 border">Termine</th>
                </tr>
            </thead>
            <tbody id="matrix-body"></tbody>
        </table>
    </div>

    <div id="mitarbeiter-view" class="hidden">
        <h1 class="text-2xl font-bold mb-4">Meine Termine</h1>
        <div id="meine-termine" class="bg-white p-4 rounded shadow"></div>
    </div>

    <script>
        async function login() {
            const name = document.getElementById('nameInput').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name })
            });

            if (res.ok) {
                const data = await res.json();
                document.getElementById('login-view').classList.add('hidden');
                if (data.role === 'planer') {
                    document.getElementById('planer-view').classList.remove('hidden');
                    ladeDashboard();
                } else {
                    document.getElementById('mitarbeiter-view').classList.remove('hidden');
                }
            } else {
                alert("Nicht gefunden.");
            }
        }

        async function ladeDashboard() {
            const res = await fetch('/api/planer/dashboard');
            const data = await res.json();
            const matrixBody = document.getElementById('matrix-body');
            
            matrixBody.innerHTML = data.mitarbeiter.map(m => {
                const termine = (data.termine || []).filter(t => t.mitarbeiter === m);
                return `<tr>
                    <td class="p-3 border font-bold">${m}</td>
                    <td class="p-3 border">${termine.map(t => `<span class="bg-blue-100 px-2 py-1 rounded text-sm">${t.kunde}</span>`).join(' ')}</td>
                </tr>`;
            }).join('');
        }
    </script>
</body>
</html>
