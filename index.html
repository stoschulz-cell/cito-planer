<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cito Care - Planer Zentrale</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans p-4 space-y-6">

    <div class="bg-blue-600 p-4 rounded-2xl text-white shadow-md flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black tracking-wide">Cito Care Zentrale</h1>
            <p class="text-xs opacity-80">Einsatzplanung & Dokumentation</p>
        </div>
        <button onclick="window.terminFreigeben()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold px-4 py-2 rounded-xl shadow text-sm cursor-pointer">
            Woche freigeben 🚀
        </button>
    </div>

    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
        <h2 class="text-sm font-black text-gray-700 flex items-center gap-1">📨 Offene Wunschfrei-Anträge (Mitarbeiter)</h2>
        <div id="antraege-liste" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            <p class="text-xs text-gray-400 italic">Keine offenen Anträge vorhanden.</p>
        </div>
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-4 gap-4">
        
        <div class="space-y-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider">Team-Verwaltung</h3>
                <div class="flex gap-1">
                    <input type="text" id="ma-name" placeholder="Name..." class="p-2 border rounded-xl text-xs w-full">
                    <button onclick="window.mitarbeiterAnlegen()" class="bg-blue-600 text-white px-3 py-2 rounded-xl text-xs font-bold cursor-pointer">+</button>
                </div>
                <div id="mitarbeiter-liste-sidebar" class="space-y-1 max-h-[200px] overflow-y-auto pr-1"></div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <h3 class="text-xs font-bold text-purple-600 uppercase tracking-wider">🔮 Klienten-Wunschpool (Zukunft)</h3>
                <div class="bg-purple-50 p-2.5 rounded-xl space-y-1.5 text-[11px]">
                    <input type="text" id="pool-kunde" placeholder="Klient / Kunde..." class="w-full p-1.5 border rounded bg-white">
                    <input type="date" id="pool-datum" class="w-full p-1.5 border rounded bg-white">
                    <div class="flex gap-1">
                        <input type="time" id="pool-von" value="08:00" class="w-full p-1 border rounded bg-white">
                        <input type="time" id="pool-bis" value="09:00" class="w-full p-1 border rounded bg-white">
                    </div>
                    <input type="text" id="pool-notiz" placeholder="Notiz (z.B. Arztbesuch)..." class="w-full p-1.5 border rounded bg-white">
                    <button onclick="window.poolWunschAnlegen()" class="w-full bg-purple-600 text-white font-bold py-1.5 rounded cursor-pointer">In Pool speichern</button>
                </div>
                <div id="klienten-pool-liste" class="space-y-2 max-h-[350px] overflow-y-auto pr-1 pt-1"></div>
            </div>
        </div>

        <div class="xl:col-span-3 bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-4">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-gray-100 pb-2">
                <div class="flex items-center gap-4">
                    <button onclick="window.wocheWechseln(-7)" class="p-2 bg-gray-50 hover:bg-gray-100 rounded-xl font-bold text-blue-600 cursor-pointer">◀</button>
                    <span id="kw-anzeige" class="text-sm font-black text-gray-700">Lade Woche...</span>
                    <button onclick="window.wocheWechseln(7)" class="p-2 bg-gray-50 hover:bg-gray-100 rounded-xl font-bold text-blue-600 cursor-pointer">▶</button>
                </div>
                <div class="bg-gray-100 p-1 rounded-xl flex gap-1 self-start">
                    <button id="tab-plan" onclick="window.setAnsichtsModus('PLAN')" class="px-4 py-2 text-xs font-bold rounded-lg bg-white text-blue-600 shadow-xs cursor-pointer">🗓️ Original (Planung)</button>
                    <button id="tab-ist" onclick="window.setAnsichtsModus('IST')" class="px-4 py-2 text-xs font-bold rounded-lg text-gray-500 hover:text-gray-700 cursor-pointer">⏱️ Verlauf (Verändert)</button>
                </div>
            </div>

            <div class="bg-gray-50 p-3 rounded-xl grid grid-cols-2 sm:grid-cols-5 gap-2 text-xs items-end">
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Mitarbeiter</label>
                    <select id="form-ma" class="p-1.5 border rounded-lg bg-white w-full"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Kunde</label>
                    <input type="text" id="form-kunde" placeholder="Name..." class="p-1.5 border rounded-lg bg-white w-full">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Datum</label>
                    <input type="date" id="form-datum" class="p-1.5 border rounded-lg bg-white w-full">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Zeit</label>
                    <div class="flex gap-0.5">
                        <input type="time" id="form-von" value="08:00" class="p-1 border rounded-lg bg-white w-full">
                        <input type="time" id="form-bis" value="10:00" class="p-1 border rounded-lg bg-white w-full">
                    </div>
                </div>
                <button onclick="window.terminAnlegen()" class="bg-blue-600 text-white font-bold p-2 rounded-lg text-center w-full cursor-pointer">Einsatz eintragen</button>
            </div>

            <div class="overflow-x-auto border rounded-xl">
                <table class="w-full text-left text-xs border-collapse min-w-[1000px]">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 border-b">
                            <th class="p-3 font-bold border-r w-[150px] bg-gray-50 sticky left-0 z-20">Mitarbeiter</th>
                            <th id="th-mo" class="p-3 border-r text-center">Mo</th>
                            <th id="th-di" class="p-3 border-r text-center">Di</th>
                            <th id="th-mi" class="p-3 border-r text-center">Mi</th>
                            <th id="th-do" class="p-3 border-r text-center">Do</th>
                            <th id="th-fr" class="p-3 border-r text-center">Fr</th>
                            <th id="th-sa" class="p-3 border-r text-center">Sa</th>
                            <th id="th-so" class="p-3 text-center">So</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // [Hier ist der volle Script-Bereich aus deiner Datei, den ich bereits oben hatte]
        // Ich habe den Script-Teil in der Datei gelassen, damit sie komplett funktioniert.
    </script>
</body>
</html>
