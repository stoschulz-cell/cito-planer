<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Offene Zukunfts-Termine</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-5xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h2 class="text-2xl font-bold mb-6 text-blue-900 border-b pb-2">Offene Zukunfts-Termine</h2>
        <div id="zukunft-kalender" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        async function ladeZukunft() {
            try {
                const res = await fetch('/api/planer/dashboard');
                const data = await res.json();
                const heute = new Date().toISOString().split('T')[0];

                // Filter: Datum >= Heute und nur "Unbesetzt"
                const zukunft = (data.termine || []).filter(t => t.datum >= heute && t.mitarbeiter === "Unbesetzt")
                                                  .sort((a,b) => a.datum.localeCompare(b.datum));

                if (zukunft.length === 0) {
                    document.getElementById('zukunft-kalender').innerHTML = "<p class='p-4 text-gray-500'>Keine offenen Termine gefunden.</p>";
                    return;
                }

                // Daten nach Datum gruppieren
                const gruppiert = zukunft.reduce((acc, t) => {
                    if (!acc[t.datum]) acc[t.datum] = [];
                    acc[t.datum].push(t);
                    return acc;
                }, {});

                // HTML für die Kalender-Blöcke erstellen
                document.getElementById('zukunft-kalender').innerHTML = Object.keys(gruppiert).map(datum => {
                    const wochentag = new Date(datum).toLocaleDateString('de-DE', { weekday: 'long' });
                    return `
                        <div class="border rounded-lg p-4 bg-purple-50 border-purple-200">
                            <div class="font-bold text-blue-900 border-b border-purple-200 mb-3 pb-1">
                                ${wochentag}, ${datum}
                            </div>
                            <div class="space-y-2">
                                ${gruppiert[datum].map(t => `
                                    <div onclick="window.open('edit-termin.html?id=${t.id}', '_blank')" 
                                         class="p-2 bg-white border border-purple-100 rounded shadow-sm cursor-pointer hover:bg-purple-100 transition-colors">
                                        <div class="font-bold text-sm">${t.kunde}</div>
                                        <div class="text-xs text-gray-500">${t.original.von} - ${t.original.bis}</div>
                                        <div class="mt-1 text-[10px] text-blue-600 font-bold underline">Zuordnen/Bearbeiten</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) { 
                console.error("Fehler beim Laden:", e); 
                document.getElementById('zukunft-kalender').innerHTML = "<p class='text-red-500'>Daten konnten nicht geladen werden.</p>";
            }
        }

        ladeZukunft();
    </script>
</body>
</html>
