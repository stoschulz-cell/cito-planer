<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cito Care Dienstplan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-7xl mx-auto bg-white p-6 rounded shadow">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold">Dienstplan Übersicht</h1>
            <div id="debug-info" class="text-sm font-bold text-blue-600"></div>
            <div class="flex items-center gap-4">
                <button onclick="wocheBlaettern(-1)" class="bg-gray-200 px-4 py-2 rounded text-sm font-bold">« Vorherige</button>
                <h2 id="kw-titel" class="font-bold text-lg text-blue-900 w-40 text-center">KW ...</h2>
                <button onclick="wocheBlaettern(1)" class="bg-gray-200 px-4 py-2 rounded text-sm font-bold">Nächste »</button>
                <button onclick="window.location.href='index.html'" class="bg-red-500 text-white px-4 py-2 rounded text-sm font-bold">Abmelden</button>
            </div>
        </div>
        <div id="plan-container"><p class="p-10 text-center">Lade Plan...</p></div>
    </div>

    <script>
        const meinName = (localStorage.getItem('mitarbeiterName') || "").trim().toLowerCase();
        document.getElementById('debug-info').innerText = "Eingeloggt als: " + meinName;

        function getMontag(date) {
            let d = new Date(date);
            let day = d.getDay();
            let diff = d.getDate() - day + (day === 0 ? -6 : 1);
            d.setDate(diff);
            d.setHours(0,0,0,0);
            return d;
        }

        let aktuellerMontag = getMontag(new Date());

        function wocheBlaettern(n) { 
            aktuellerMontag.setDate(aktuellerMontag.getDate() + (n * 7)); 
            ladeUebersicht(); 
        }

        async function ladeUebersicht() {
            try {
                const res = await fetch('/api/planer/dashboard');
                const d = await res.json();
                
                // KW Titel setzen
                const d2 = new Date(aktuellerMontag);
                d2.setUTCDate(d2.getUTCDate() + 4 - (d2.getUTCDay()||7));
                const yearStart = new Date(Date.UTC(d2.getUTCFullYear(),0,1));
                const kw = Math.ceil((((d2 - yearStart) / 86400000) + 1)/7);
                document.getElementById('kw-titel').innerText = `KW ${kw}`;

                let tage = [];
                for(let i=0; i<7; i++) {
                    let t = new Date(aktuellerMontag);
                    t.setDate(t.getDate() + i);
                    tage.push(t.toISOString().split('T')[0]);
                }

                let html = '<table class="w-full border-collapse border"><thead><tr><th class="p-3 border">Mitarbeiter</th>';
                ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach((t,i) => html += `<th class="p-3 border">${t}<br>${tage[i].split('-')[2]}.${tage[i].split('-')[1]}</th>`);
                html += '</tr></thead><tbody>';

                (d.mitarbeiterListe || []).forEach(m => {
                    const dbName = (m.name || "").trim().toLowerCase();
                    const isOwner = (dbName === meinName);
                    html += `<tr><td class="p-3 border font-bold">${m.name}</td>`;
                    tage.forEach(t => {
                        const termin = (d.termine || []).find(x => x.mitarbeiter === m.name && x.datum === t);
                        if (!termin) {
                            html += `<td class="border p-2"></td>`;
                        } else {
                            let v = termin.hatAenderung ? termin.aktuell : (termin.original || {von: termin.von_uhrzeit || "00:00", bis: termin.bis_uhrzeit || "00:00"});
                            html += `<td class="border p-2 text-[10px]"><b>${termin.kunde}</b><br>${v.von}-${v.bis} ${isOwner ? `<button onclick="terminBearbeiten('${termin.id}', '${termin.datum}', '${v.von}', '${v.bis}')" class="block w-full bg-blue-600 text-white mt-1 rounded">Ändern</button>` : ''}</td>`;
                        }
                    });
                    html += '</tr>';
                });
                document.getElementById('plan-container').innerHTML = html + '</tbody></table>';
            } catch (e) { console.error(e); }
        }

        async function terminBearbeiten(id, datum, von, bis) {
            const neuesDatum = prompt("Neues Datum (YYYY-MM-DD):", datum);
            const neueVon = prompt("Neue Uhrzeit (von):", von);
            const neueBis = prompt("Neue Uhrzeit (bis):", bis);
            if (neuesDatum && neueVon && neueBis) {
                await fetch('/api/mitarbeiter/verschieben-als-aenderung', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: Number(id), neuesDatum, neueVon, neueBis })
                });
                ladeUebersicht();
            }
        }

        window.onload = ladeUebersicht;
    </script>
</body>
</html>
