<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cito Care Dienstplan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-7xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-xl font-bold mb-6">Dienstplan</h1>
        <div id="plan-container"><p>Lade Plan...</p></div>
    </div>

    <script>
        const meinName = localStorage.getItem('mitarbeiterName') || "";
        let aktuellerMontag = new Date();
        aktuellerMontag.setDate(aktuellerMontag.getDate() - (aktuellerMontag.getDay() + 6) % 7);
        aktuellerMontag.setHours(0,0,0,0);

        async function ladeUebersicht() {
            const container = document.getElementById('plan-container');
            const res = await fetch('/api/planer/dashboard');
            const d = await res.json();

            let tage = [];
            for(let i=0; i<7; i++) {
                let t = new Date(aktuellerMontag);
                t.setDate(t.getDate() + i);
                tage.push(t.toISOString().split('T')[0]);
            }

            let html = `<table class="w-full border-collapse border"><tbody>`;
            (d.mitarbeiterListe || []).forEach(m => {
                html += `<tr><td class="p-3 border font-bold">${m.name}</td>`;
                tage.forEach(t => {
                    const termin = (d.termine || []).find(x => x.mitarbeiter === m.name && x.datum === t);
                    if (!termin) {
                        html += `<td class="border p-2 text-xs text-gray-300">-</td>`;
                    } else {
                        let v = termin.hatAenderung ? termin.aktuell : (termin.original || {von: "00:00", bis: "00:00"});
                        html += `<td class="border p-2 text-[10px]">
                            <b>${termin.kunde}</b><br>${v.von}-${v.bis}
                            <button onclick="terminBearbeiten('${termin.id}', '${v.von}', '${v.bis}')" 
                                    class="block w-full bg-blue-600 text-white mt-1 rounded">Ändern</button>
                        </td>`;
                    }
                });
                html += `</tr>`;
            });
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        async function terminBearbeiten(id, alteVon, alteBis) {
            const neueVon = prompt("Neue Startzeit:", alteVon);
            const neueBis = prompt("Neue Endzeit:", alteBis);
            if (neueVon && neueBis) {
                await fetch('/api/mitarbeiter/verschieben-als-aenderung', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: Number(id), neueVon, neueBis })
                });
                alert("Änderung gesendet!");
                ladeUebersicht();
            }
        }

        window.onload = ladeUebersicht;
    </script>
</body>
</html>
