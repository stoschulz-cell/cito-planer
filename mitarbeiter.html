<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cito Care Dienstplan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div id="plan-container" class="max-w-7xl mx-auto bg-white p-6 rounded shadow">
        <p>Lade Dienstplan...</p>
    </div>

    <script>
        const meinName = localStorage.getItem('mitarbeiterName') || "";
        let aktuellerMontag = new Date();
        aktuellerMontag.setDate(aktuellerMontag.getDate() - (aktuellerMontag.getDay() + 6) % 7);
        aktuellerMontag.setHours(0,0,0,0);

        async function ladeUebersicht() {
            const container = document.getElementById('plan-container');
            const res = await fetch('/api/planer/dashboard');
            const d = await res.json();

            // Debug: Zeige uns, wen das System gerade "sieht"
            console.log("Eingeloggter Name:", meinName);

            let html = `<table class="w-full border-collapse border"><tbody id="matrix-body"></tbody></table>`;
            container.innerHTML = html;

            let body = document.getElementById('matrix-body');
            (d.mitarbeiterListe || []).forEach(m => {
                let row = document.createElement('tr');
                row.innerHTML = `<td class="p-3 border font-bold">${m.name}</td>`;
                
                // Erstelle 7 Spalten für die Woche
                for(let i=0; i<7; i++) {
                    let cell = document.createElement('td');
                    cell.className = "p-2 border";
                    // Button immer anzeigen zum Testen!
                    cell.innerHTML = `
                        <button onclick="alert('Button geklickt!')" class="bg-red-500 text-white p-2 rounded">
                            Ändern
                        </button>`;
                    row.appendChild(cell);
                }
                body.appendChild(row);
            });
        }

        window.onload = ladeUebersicht;
    </script>
</body>
</html>
