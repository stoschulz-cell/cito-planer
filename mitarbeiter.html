<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cito Care Dienstplan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-7xl mx-auto bg-white p-6 rounded shadow">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold">Dienstplan Übersicht</h1>
            <div id="debug-info" class="text-xs text-gray-500 font-mono"></div>
            <button onclick="window.location.href='index.html'" class="bg-red-500 text-white px-4 py-2 rounded text-sm font-bold">Abmelden</button>
        </div>
        <div id="plan-container">
            <p class="text-center p-10 text-gray-500">Lade Plan...</p>
        </div>
    </div>

    <script>
        const meinName = (localStorage.getItem('mitarbeiterName') || "").trim().toLowerCase();
        document.getElementById('debug-info').innerText = "Eingeloggt als: " + meinName;

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function getMontagVonWoche(date) {
            let d = new Date(date);
            let day = d.getDay();
            let diff = d.getDate() - day + (day === 0 ? -6 : 1);
            d.setDate(diff);
            d.setHours(0,0,0,0);
            return d;
        }

        let aktuellerMontag = getMontagVonWoche(new Date());

        function getKwId(date) {
            let d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            let year = d.getUTCFullYear();
            let yearStart = new Date(Date.UTC(year,0,1));
            let kw = Math.ceil((((d - yearStart) / 86400000) + 1)/7);
            return `${year}-${kw}`;
        }

        async function ladeUebersicht() {
            const container = document.getElementById('plan-container');
            const res = await fetch('/api/planer/dashboard');
            const d = await res.json();
            
            let tage = [];
            for(let i=0; i<7; i++) {
                let tag = new Date(aktuellerMontag);
                tag.setDate(tag.getDate() + i);
                tage.push(formatDate(tag));
            }

            let headerHtml = '<thead><tr><th class="p-3 border">Mitarbeiter</th>' + 
                tage.map((t, i) => `<th class="p-3 border">${['Mo','Di','Mi','Do','Fr','Sa','So'][i]}<br>${t.split('-')[2]}.${t.split('-')[1]}.</th>`).join('') + '</tr></thead>';

            let bodyHtml = '<tbody>' + (d.mitarbeiterListe || []).map(m => {
                const dbName = m.name.trim().toLowerCase();
                const isOwner = (dbName === meinName);
                
                let row = `<tr><td class="p-3 border font-bold">${m.name}<div class="text-[9px] text-gray-400 font-normal">DB: ${dbName}</div></td>`;
                
                tage.forEach(t => {
                    const termin = (d.termine || []).find(x => x.mitarbeiter === m.name && x.datum === t);
                    if (!termin) {
                        row += `<td class="border p-2"></td>`;
                    } else {
                        let v = termin.hatAenderung ? termin.aktuell : (termin.original || {von: termin.von_uhrzeit || "00:00", bis: termin.bis_uhrzeit || "00:00"});
                        row += `<td class="border p-2 text-[10px] ${termin.hatAenderung ? 'bg-orange-100' : ''}">
                            <b>${termin.kunde}</b><br>${v.von}-${v.bis}
                            ${isOwner ? `<button onclick="terminBearbeiten('${termin.id}', '${termin.datum}', '${v.von}', '${v.bis}')" class="bg-blue-600 text-white w-full rounded mt-1">Ändern</button>` : ''}
                        </td>`;
                    }
                });
                return row + `</tr>`;
            }).join('') + '</tbody>';

            container.innerHTML = `<table class="w-full border-collapse border">${headerHtml}${bodyHtml}</table>`;
        }

        async function terminBearbeiten(id, altesDatum, alteVon, alteBis) {
            let wochenStart = new Date(aktuellerMontag);
            let wochenEnde = new Date(aktuellerMontag);
            wochenEnde.setDate(wochenEnde.getDate() + 6);

            const neuesDatum = prompt("Neues Datum (YYYY-MM-DD):", altesDatum);
            if (!neuesDatum) return;
            
            const neueVon = prompt("Neue Uhrzeit (von):", alteVon);
            const neueBis = prompt("Neue Uhrzeit (bis):", alteBis);

            if (neuesDatum && neueVon && neueBis) {
                await fetch('/api/mitarbeiter/verschieben-als-aenderung', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: Number(id), neuesDatum, neueVon, neueBis })
                });
                alert("Änderung gesendet!");
                ladeUebersicht();
            }
        }

        window.onload = ladeUebersicht;
    </script>
</body>
</html>
