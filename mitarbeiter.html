<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cito Care Mitarbeiter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded shadow">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold">Meine Termine - <span id="ma-name" class="text-blue-600"></span></h1>
            <div class="flex items-center gap-2">
                <button onclick="wocheBlaettern(-1)" class="bg-gray-200 px-3 py-1 rounded text-sm hover:bg-gray-300">«</button>
                <span id="kw-titel" class="font-bold w-32 text-center text-sm"></span>
                <button onclick="wocheBlaettern(1)" class="bg-gray-200 px-3 py-1 rounded text-sm hover:bg-gray-300">»</button>
            </div>
        </div>
        
        <div id="meine-ansicht" class="space-y-4">Lade Termine...</div>
        
        <button onclick="window.location.href='index.html'" class="mt-6 bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Abmelden</button>
    </div>

    <script>
        const meinName = localStorage.getItem('mitarbeiterName');
        let aktuellerMontag = new Date();
        aktuellerMontag.setDate(aktuellerMontag.getDate() - (aktuellerMontag.getDay() + 6) % 7);
        aktuellerMontag.setHours(0,0,0,0);

        document.getElementById('ma-name').innerText = meinName || "Gast";

        function getKwId(date) {
            let d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            let kw = Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(),0,1))) / 86400000) + 1)/7);
            return `${d.getUTCFullYear()}-${kw}`;
        }

        async function ladeMitarbeiterAnsicht() {
            try {
                const res = await fetch('/api/planer/dashboard');
                const d = await res.json();
                const kwId = getKwId(aktuellerMontag);
                
                document.getElementById('kw-titel').innerText = `KW ${kwId.split('-')[1]} (${kwId.split('-')[0]})`;

                if (!d.freigaben || !d.freigaben[kwId]) {
                    document.getElementById('meine-ansicht').innerHTML = `<p class="text-red-500 p-4 border border-red-200 bg-red-50 rounded">Der Dienstplan für diese Woche wurde noch nicht freigegeben.</p>`;
                    return;
                }

                let montag = new Date(aktuellerMontag);
                let sonntag = new Date(montag);
                sonntag.setDate(sonntag.getDate() + 6);

                const meineTermine = (d.termine || []).filter(t => {
                    let [y, m, d_val] = t.datum.split('-').map(Number);
                    let terminDate = new Date(y, m - 1, d_val);
                    return t.mitarbeiter.trim() === meinName.trim() && terminDate >= montag && terminDate <= sonntag;
                });

                if (meineTermine.length === 0) {
                    document.getElementById('meine-ansicht').innerHTML = "<p class='text-gray-500 italic'>Keine Termine für diese Woche.</p>";
                } else {
                    document.getElementById('meine-ansicht').innerHTML = meineTermine.map(t => `
                        <div class="p-4 border rounded ${t.istGeaendert ? 'bg-orange-50 border-orange-400' : 'bg-blue-50 border-blue-200'}">
                            <div class="flex justify-between items-center">
                                <p class="font-bold text-gray-800">${t.kunde} <span class="text-sm font-normal text-gray-500">(${t.datum})</span></p>
                                ${t.istGeaendert ? '<span class="text-[10px] bg-orange-200 px-2 rounded font-bold uppercase">Geändert</span>' : ''}
                            </div>
                            <div class="flex gap-2 mt-2 items-center">
                                <input type="time" id="von-${t.id}" value="${t.von_uhrzeit}" class="border p-1 rounded">
                                <span>bis</span>
                                <input type="time" id="bis-${t.id}" value="${t.bis_uhrzeit}" class="border p-1 rounded">
                                <button onclick="terminAendern(${t.id})" class="bg-green-600 text-white px-4 py-1 rounded text-sm hover:bg-green-700 font-bold">Speichern</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                document.getElementById('meine-ansicht').innerHTML = "Fehler beim Laden der Daten.";
            }
        }

        function wocheBlaettern(n) { 
            aktuellerMontag.setDate(aktuellerMontag.getDate() + (n * 7)); 
            ladeMitarbeiterAnsicht(); 
        }

        async function terminAendern(id) {
            const von = document.getElementById(`von-${id}`).value;
            const bis = document.getElementById(`bis-${id}`).value;
            const res = await fetch('/api/mitarbeiter/termin/update', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, von, bis, geaendertVon: meinName })
            });
            if(res.ok) {
                alert("Änderung erfolgreich übermittelt!");
                ladeMitarbeiterAnsicht();
            } else {
                alert("Fehler beim Speichern!");
            }
        }

        window.onload = ladeMitarbeiterAnsicht;
    </script>
</body>
</html>
