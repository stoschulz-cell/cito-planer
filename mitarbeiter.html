<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cito Care Dienstplan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-7xl mx-auto bg-white p-6 rounded shadow">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold">Dienstplan Übersicht</h1>
            <div class="flex items-center gap-4">
                <button onclick="wocheBlaettern(-1)" class="bg-gray-200 px-4 py-2 rounded text-sm font-bold">« Vorherige</button>
                <h2 id="kw-titel" class="font-bold text-lg text-blue-900 w-40 text-center"></h2>
                <button onclick="wocheBlaettern(1)" class="bg-gray-200 px-4 py-2 rounded text-sm font-bold">Nächste »</button>
                <button onclick="window.location.href='index.html'" class="bg-red-500 text-white px-4 py-2 rounded text-sm font-bold">Abmelden</button>
            </div>
        </div>

        <div id="plan-container">
            <p class="text-center p-10 text-gray-500">Lade Plan...</p>
        </div>
    </div>

    <script>
        const meinName = localStorage.getItem('mitarbeiterName') || "";
        let aktuellerMontag = new Date();
        aktuellerMontag.setDate(aktuellerMontag.getDate() - (aktuellerMontag.getDay() + 6) % 7);
        aktuellerMontag.setHours(0,0,0,0);

        function getKwId(date) {
            let d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            let kw = Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(),0,1))) / 86400000) + 1)/7);
            return `${d.getUTCFullYear()}-${kw}`;
        }

        async function ladeUebersicht() {
            const container = document.getElementById('plan-container');
            try {
                const res = await fetch('/api/planer/dashboard');
                const d = await res.json();
                const kwId = getKwId(aktuellerMontag);
                
                document.getElementById('kw-titel').innerText = `KW ${kwId.split('-')[1]}`;

                if (!d.freigaben?.[kwId]) {
                    container.innerHTML = `<div class="p-10 text-center bg-yellow-50">Plan ist ENTWURF.</div>`;
                    return;
                }

                container.innerHTML = `
                    <div class="overflow-x-auto">
                        <table class="w-full border-collapse border">
                            <thead><tr id="table-header" class="bg-blue-50 text-left text-xs uppercase"></tr></thead>
                            <tbody id="matrix-body" class="bg-white"></tbody>
                        </table>
                    </div>`;

                let tage = [];
                for(let i=0; i<7; i++) {
                    let tag = new Date(aktuellerMontag);
                    tag.setDate(tag.getDate() + i);
                    tage.push(tag.toISOString().split('T')[0]);
                }

                document.getElementById('table-header').innerHTML = '<th class="p-3 border">Mitarbeiter</th>' + 
                    tage.map((t, i) => `<th class="p-3 border">${['Mo','Di','Mi','Do','Fr','Sa','So'][i]}</th>`).join('');

                document.getElementById('matrix-body').innerHTML = (d.mitarbeiterListe || []).map(m => {
                    const termineMA = (d.termine || []).filter(x => x.mitarbeiter === m.name && tage.includes(x.datum));
                    return `
                        <tr class="hover:bg-gray-50">
                            <td class="p-3 border font-bold">${m.name}</td>
                            ${tage.map(t => {
                                const termin = termineMA.find(x => x.datum === t);
                                if (!termin) return '<td class="p-2 border"></td>';
                                
                                // Wenn MA selbst: Bearbeitbar, sonst nur Info
                                const isOwner = m.name === meinName;
                                const v = termin.aktuell || termin.original;

                                return `<td class="p-2 border ${termin.hatAenderung ? 'bg-orange-50' : ''}">
                                    <b>${termin.kunde}</b><br>
                                    ${isOwner ? `
                                        <input type="time" id="von-${termin.id}" value="${v.von}" class="border w-20 text-xs">
                                        <input type="time" id="bis-${termin.id}" value="${v.bis}" class="border w-20 text-xs mt-1">
                                        <button onclick="terminVerschieben(${termin.id})" class="bg-green-500 text-white px-2 py-1 text-[10px] mt-1 rounded">Speichern</button>
                                    ` : `${v.von}-${v.bis}`}
                                </td>`;
                            }).join('')}
                        </tr>
                    `;
                }).join('');
            } catch (err) { container.innerHTML = "Fehler beim Laden."; }
        }

        async function terminVerschieben(id) {
            const neueVon = document.getElementById(`von-${id}`).value;
            const neueBis = document.getElementById(`bis-${id}`).value;
            await fetch('/api/mitarbeiter/verschieben', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, neueVon, neueBis })
            });
            alert("Verschoben!");
            ladeUebersicht();
        }

        function wocheBlaettern(n) { 
            aktuellerMontag.setDate(aktuellerMontag.getDate() + (n * 7)); 
            ladeUebersicht(); 
        }

        window.onload = ladeUebersicht;
    </script>
</body>
</html>
