<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cito Care Dienstplan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-7xl mx-auto bg-white p-6 rounded shadow">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold">Dienstplan Übersicht</h1>
            <div class="flex items-center gap-4">
                <button onclick="wocheBlaettern(-1)" class="bg-gray-200 px-4 py-2 rounded text-sm font-bold">« Vorherige</button>
                <h2 id="kw-titel" class="font-bold text-lg text-blue-900 w-40 text-center">KW ...</h2>
                <button onclick="wocheBlaettern(1)" class="bg-gray-200 px-4 py-2 rounded text-sm font-bold">Nächste »</button>
                <button onclick="window.location.href='index.html'" class="bg-red-500 text-white px-4 py-2 rounded text-sm font-bold">Abmelden</button>
            </div>
        </div>

        <div id="plan-container">
            <p class="text-center p-10 text-gray-500">Lade Plan...</p>
        </div>
    </div>

    <script>
        const meinName = localStorage.getItem('mitarbeiterName') || "";
        let aktuellerMontag = new Date();
        aktuellerMontag.setDate(aktuellerMontag.getDate() - (aktuellerMontag.getDay() + 6) % 7);
        aktuellerMontag.setHours(0,0,0,0);

        function getKwId(date) {
            let d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            let kw = Math.ceil((((d - new Date(Date.UTC(d.getUTCFullYear(),0,1))) / 86400000) + 1)/7);
            return `${d.getUTCFullYear()}-${kw}`;
        }

        async function ladeUebersicht() {
            const container = document.getElementById('plan-container');
            const res = await fetch('/api/planer/dashboard');
            const d = await res.json();
            const kwId = getKwId(aktuellerMontag);
            
            document.getElementById('kw-titel').innerText = `KW ${kwId.split('-')[1]}`;

            let tage = [];
            for(let i=0; i<7; i++) {
                let tag = new Date(aktuellerMontag);
                tag.setDate(tag.getDate() + i);
                tage.push(tag.toISOString().split('T')[0]);
            }

            let headerHtml = '<tr><th class="p-3 border">Mitarbeiter</th>' + 
                tage.map((t, i) => `<th class="p-3 border">${['Mo','Di','Mi','Do','Fr','Sa','So'][i]}<br>${t.split('-')[2]}.${t.split('-')[1]}.</th>`).join('') + '</tr>';

            let bodyHtml = (d.mitarbeiterListe || []).map(m => {
                let row = `<tr><td class="p-3 border font-bold">${m.name}</td>`;
                tage.forEach(t => {
                    const termin = (d.termine || []).find(x => x.mitarbeiter === m.name && x.datum === t);
                    if (!termin) {
                        row += `<td class="border p-2"></td>`;
                    } else {
                        let v = termin.hatAenderung ? termin.aktuell : (termin.original || {von: termin.von_uhrzeit || "00:00", bis: termin.bis_uhrzeit || "00:00"});
                        row += `<td class="border p-2 text-[10px] ${termin.hatAenderung ? 'bg-orange-100' : ''}">
                            <b>${termin.kunde}</b><br>${v.von}-${v.bis}
                            <button onclick="terminBearbeiten('${termin.id}', '${v.von}', '${v.bis}')" 
                                    class="block w-full bg-blue-600 text-white mt-1 rounded">Ändern</button>
                        </td>`;
                    }
                });
                return row + `</tr>`;
            }).join('');

            container.innerHTML = `<table class="w-full border-collapse border"><thead>${headerHtml}</thead><tbody>${bodyHtml}</tbody></table>`;
        }

        async function terminBearbeiten(id, alteVon, alteBis) {
            const neueVon = prompt("Neue Uhrzeit (von):", alteVon);
            const neueBis = prompt("Neue Uhrzeit (bis):", alteBis);
            if (neueVon && neueBis) {
                await fetch('/api/mitarbeiter/verschieben-als-aenderung', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: Number(id), neueVon, neueBis })
                });
                alert("Änderung gesendet!");
                ladeUebersicht();
            }
        }

        function wocheBlaettern(n) { 
            aktuellerMontag.setDate(aktuellerMontag.getDate() + (n * 7)); 
            ladeUebersicht(); 
        }

        window.onload = ladeUebersicht;
    </script>
</body>
</html>
