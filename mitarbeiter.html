<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cito Care Dienstplan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-7xl mx-auto bg-white p-6 rounded shadow">
        <div class="flex flex-col gap-6 mb-6">
            <div class="flex justify-between items-center">
                <h1 class="text-xl font-bold">Dienstplan Übersicht</h1>
                <div id="status-display" class="text-sm font-bold text-blue-600 italic">Lade...</div>
                <div class="flex items-center gap-4">
                    <button onclick="wocheBlaettern(-1)" class="bg-gray-200 px-4 py-2 rounded text-sm font-bold">« Vorherige</button>
                    <h2 id="kw-titel" class="font-bold text-lg text-blue-900 w-40 text-center">KW ...</h2>
                    <button onclick="wocheBlaettern(1)" class="bg-gray-200 px-4 py-2 rounded text-sm font-bold">Nächste »</button>
                    <button onclick="window.location.href='index.html'" class="bg-red-500 text-white px-4 py-2 rounded text-sm font-bold">Abmelden</button>
                </div>
            </div>

            <div class="p-4 bg-blue-50 rounded-lg border border-blue-200 shadow-sm">
                <h3 class="font-bold text-sm mb-2 text-blue-800">Wunschfrei / Termin melden:</h3>
                <div class="flex flex-wrap gap-3 items-center">
                    <input type="date" id="wunsch-datum" class="p-2 border rounded text-sm">
                    <input type="time" id="wunsch-zeit" class="p-2 border rounded text-sm">
                    <input type="text" id="wunsch-grund" placeholder="Grund (z.B. Arzt)" class="p-2 border rounded text-sm flex-grow">
                    <button onclick="wunschSenden()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm font-bold hover:bg-blue-700">Absenden</button>
                </div>
            </div>
        </div>

        <div id="plan-container" class="overflow-x-auto"><p class="p-10 text-center">Lade Plan...</p></div>
    </div>

    <script>
        let aktuellerMontag = new Date();
        let day = aktuellerMontag.getUTCDay();
        let diff = aktuellerMontag.getUTCDate() - day + (day === 0 ? -6 : 1);
        aktuellerMontag.setUTCDate(diff);
        aktuellerMontag.setUTCHours(0,0,0,0);

        document.getElementById('status-display').innerText = "Angemeldet als: " + (localStorage.getItem('mitarbeiterName') || "Unbekannt");

        function wocheBlaettern(n) { 
            aktuellerMontag.setUTCDate(aktuellerMontag.getUTCDate() + (n * 7)); 
            ladeUebersicht(); 
        }

        function getISOWeek(date) {
            let d = new Date(Date.UTC(date.getUTCFullYear(), date.getUTCMonth(), date.getUTCDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            let yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        async function ladeUebersicht() {
            try {
                const res = await fetch('/api/planer/dashboard');
                const d = await res.json();
                
                document.getElementById('kw-titel').innerText = `KW ${getISOWeek(aktuellerMontag)}`;

                let tage = [];
                for(let i=0; i<7; i++) {
                    let t = new Date(aktuellerMontag);
                    t.setUTCDate(t.getUTCDate() + i);
                    tage.push(t.toISOString().split('T')[0]);
                }

                if (!d.mitarbeiterListe) {
                    document.getElementById('plan-container').innerHTML = "<p class='p-5 text-center text-red-500'>Daten konnten nicht geladen werden.</p>";
                    return;
                }

                let html = '<table class="w-full border-collapse border shadow-sm"><thead class="bg-blue-50 text-xs uppercase text-blue-900"><tr><th class="p-3 border">Mitarbeiter</th>';
                ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach((t,i) => html += `<th class="p-3 border">${t}<br>${tage[i].split('-')[2]}.${tage[i].split('-')[1]}</th>`);
                html += '</tr></thead><tbody class="bg-white">';

                d.mitarbeiterListe.forEach(m => {
                    const isOwner = (m.name.toLowerCase() === (localStorage.getItem('mitarbeiterName') || "").toLowerCase());
                    html += `<tr><td class="p-3 border font-bold ${isOwner ? 'bg-blue-100' : ''}">${m.name}</td>`;
                    
                    tage.forEach(t => {
                        // Hier wird gefiltert, um ALLE Termine des Mitarbeiters am Tag zu erhalten
                        const termine = (d.termine || []).filter(x => x.mitarbeiter === m.name && x.datum === t);
                        
                        html += `<td class="border p-1 h-20 align-top">`;
                        termine.forEach(termin => {
                            let v = termin.hatAenderung ? termin.aktuell : (termin.original || {von: termin.von_uhrzeit || "00:00", bis: termin.bis_uhrzeit || "00:00"});
                            html += `<div class="p-1 mb-1 bg-blue-50 rounded border text-[10px] ${termin.hatAenderung ? 'bg-orange-100' : ''}">
                                        <b>${termin.kunde}</b><br>${v.von}-${v.bis}
                                        ${isOwner ? `<button onclick="terminBearbeiten('${termin.id}', '${termin.datum}', '${v.von}', '${v.bis}')" class="block w-full bg-blue-600 text-white mt-1 rounded py-0.5">Ändern</button>` : ''}
                                    </div>`;
                        });
                        html += `</td>`;
                    });
                    html += '</tr>';
                });
                document.getElementById('plan-container').innerHTML = html + '</tbody></table>';
            } catch (e) { 
                console.error("Ladefehler:", e); 
            }
        }

        async function wunschSenden() {
            const datum = document.getElementById('wunsch-datum').value;
            const zeit = document.getElementById('wunsch-zeit').value;
            const grund = document.getElementById('wunsch-grund').value;
            if (!datum || !grund) return alert("Bitte Datum und Grund angeben!");
            const response = await fetch('/api/mitarbeiter/wunsch-einreichen', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mitarbeiter: localStorage.getItem('mitarbeiterName'), datum, zeit, grund, status: 'pending' })
            });
            if (response.ok) { alert("Wunsch gesendet!"); ladeUebersicht(); }
        }

        async function terminBearbeiten(id, datum, von, bis) {
            const neuesDatum = prompt("Neues Datum (YYYY-MM-DD):", datum);
            if (!neuesDatum) return;
            const neueVon = prompt("Neue Uhrzeit (von):", von);
            const neueBis = prompt("Neue Uhrzeit (bis):", bis);
            if (neueVon && neueBis) {
                await fetch('/api/mitarbeiter/verschieben-als-aenderung', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ id: Number(id), neuesDatum, neueVon, neueBis })
                });
                ladeUebersicht();
            }
        }
        window.onload = ladeUebersicht;
    </script>
</body>
</html>
