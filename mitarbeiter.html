<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cito Care - Mitarbeiter Team-Ansicht</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans p-4 space-y-6">

    <div id="login-block" class="max-w-md mx-auto mt-20 p-6 bg-white rounded-2xl shadow-md border border-gray-100 space-y-4">
        <div class="text-center">
            <h1 class="text-xl font-black text-blue-600">Cito Care Login</h1>
            <p class="text-xs text-gray-400">Bitte mit Ihrem Namen anmelden</p>
        </div>
        <div class="space-y-2">
            <input type="text" id="login-name" placeholder="Ihr Name..." class="w-full p-3 border rounded-xl text-sm">
            <input type="password" id="login-pass" value="cito2026" class="w-full p-3 border rounded-xl text-sm bg-gray-50">
        </div>
        <button onclick="window.login()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-sm text-sm cursor-pointer">
            Einloggen 🔓
        </button>
    </div>

    <div id="app-block" class="hidden space-y-6">
        
        <div class="bg-blue-600 p-4 rounded-2xl text-white shadow-md flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black tracking-wide">Cito Care Team-Ansicht</h1>
                <p class="text-xs opacity-80">Eingeloggt als: <span id="user-anzeige" class="font-bold underline"></span></p>
            </div>
            <button onclick="window.logout()" class="bg-white/20 hover:bg-white/30 text-white text-xs font-bold px-3 py-1.5 rounded-lg border border-white/20 cursor-pointer">
                Abmelden 🚪
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <h3 class="text-xs font-bold text-amber-600 uppercase tracking-wider">🛑 Eigenes „Wunschfrei“ beantragen</h3>
                <div class="grid grid-cols-1 sm:grid-cols-4 gap-2 text-xs items-end">
                    <div class="sm:col-span-2">
                        <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Datum</label>
                        <input type="date" id="frei-datum" class="p-1.5 border rounded-lg bg-white w-full">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Von</label>
                        <input type="time" id="frei-von" value="08:00" class="p-1.5 border rounded-lg bg-white w-full">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Bis</label>
                        <input type="time" id="frei-bis" value="16:00" class="p-1.5 border rounded-lg bg-white w-full">
                    </div>
                    <div class="sm:col-span-3">
                        <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Grund / Notiz</label>
                        <input type="text" id="frei-grund" placeholder="Grund eintragen..." class="p-1.5 border rounded-lg bg-white w-full">
                    </div>
                    <button onclick="window.antragSenden()" class="bg-amber-500 text-white font-bold p-2 rounded-lg text-center w-full cursor-pointer h-[34px]">Senden</button>
                </div>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <h3 class="text-xs font-bold text-purple-600 uppercase tracking-wider">🔮 Zukünftigen Klienten-Wunsch aufnehmen</h3>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 text-xs items-end">
                    <div class="col-span-2 sm:col-span-1">
                        <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Klient</label>
                        <input type="text" id="pool-kunde" placeholder="Name..." class="p-1.5 border rounded-lg bg-white w-full">
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Wunsch-Datum</label>
                        <input type="date" id="pool-datum" class="p-1.5 border rounded-lg bg-white w-full">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Von / Bis</label>
                        <div class="flex gap-0.5">
                            <input type="time" id="pool-von" value="08:00" class="p-1 border rounded-lg bg-white w-full">
                            <input type="time" id="pool-bis" value="09:00" class="p-1 border rounded-lg bg-white w-full">
                        </div>
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label class="block text-[10px] font-bold text-gray-500 mb-0.5">Zusatzinfo</label>
                        <input type="text" id="pool-notiz" placeholder="z.B. Arztbesuch..." class="p-1.5 border rounded-lg bg-white w-full">
                    </div>
                    <button onclick="window.klientenWunschSenden()" class="bg-purple-600 text-white font-bold p-2 rounded-lg text-center w-full cursor-pointer col-span-2 sm:col-span-4 h-[34px]">In Planer-Pool speichern ✨</button>
                </div>
            </div>

        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-4">
            
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-gray-100 pb-2">
                <div class="flex items-center gap-4">
                    <button onclick="window.wocheWechseln(-7)" class="p-2 bg-gray-50 hover:bg-gray-100 rounded-xl font-bold text-blue-600 cursor-pointer">◀</button>
                    <span id="kw-anzeige" class="text-sm font-black text-gray-700">Lade Woche...</span>
                    <button onclick="window.wocheWechseln(7)" class="p-2 bg-gray-50 hover:bg-gray-100 rounded-xl font-bold text-blue-600 cursor-pointer">▶</button>
                </div>

                <div class="bg-gray-100 p-1 rounded-xl flex gap-1 self-start">
                    <button id="tab-plan" onclick="window.setAnsichtsModus('PLAN')" class="px-4 py-2 text-xs font-bold rounded-lg bg-white text-blue-600 shadow-xs cursor-pointer">🗓️ Geplante Dienste</button>
                    <button id="tab-ist" onclick="window.setAnsichtsModus('IST')" class="px-4 py-2 text-xs font-bold rounded-lg text-gray-500 hover:text-gray-700 cursor-pointer">⏱️ Tatsächlicher Verlauf</button>
                </div>
            </div>

            <div class="overflow-x-auto border rounded-xl">
                <table class="w-full text-left text-xs border-collapse min-w-[1000px]">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 border-b">
                            <th class="p-3 font-bold border-r w-[150px] bg-gray-50 sticky left-0 z-20">Team-Kollegen</th>
                            <th id="th-mo" class="p-3 border-r text-center">Mo</th>
                            <th id="th-di" class="p-3 border-r text-center">Di</th>
                            <th id="th-mi" class="p-3 border-r text-center">Mi</th>
                            <th id="th-do" class="p-3 border-r text-center">Do</th>
                            <th id="th-fr" class="p-3 border-r text-center">Fr</th>
                            <th id="th-sa" class="p-3 border-r text-center">Sa</th>
                            <th id="th-so" class="p-3 text-center">So</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-body"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const API_URL = "/api";
        let fokusDatum = new Date();
        let ansichtsModus = "PLAN";
        let aktuellerUser = localStorage.getItem('cito_user') || null;

        window.login = async function() {
            const name = document.getElementById('login-name').value;
            const passwort = document.getElementById('login-pass').value;
            if(!name) return;

            const antwort = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, passwort })
            });

            if(antwort.ok) {
                const erg = await antwort.json();
                aktuellerUser = erg.name;
                localStorage.setItem('cito_user', erg.name);
                ZeigeApp();
            } else {
                alert("Name im System nicht gefunden!");
            }
        };

        window.logout = function() {
            localStorage.removeItem('cito_user');
            location.reload();
        };

        window.setAnsichtsModus = function(modus) {
            ansichtsModus = modus;
            const btnPlan = document.getElementById('tab-plan');
            const btnIst = document.getElementById('tab-ist');
            if(modus === 'PLAN') {
                btnPlan.className = "px-4 py-2 text-xs font-bold rounded-lg bg-white text-blue-600 shadow-xs cursor-pointer";
                btnIst.className = "px-4 py-2 text-xs font-bold rounded-lg text-gray-500 hover:text-gray-700 cursor-pointer";
            } else {
                btnIst.className = "px-4 py-2 text-xs font-bold rounded-lg bg-white text-orange-600 shadow-xs cursor-pointer";
                btnPlan.className = "px-4 py-2 text-xs font-bold rounded-lg text-gray-500 hover:text-gray-700 cursor-pointer";
            }
            window.ladeDashboard();
        };

        function getWochenDaten(basisDatum) {
            const dCopy = new Date(basisDatum);
            const tag = dCopy.getDay();
            const diff = dCopy.getDate() - tag + (tag === 0 ? -6 : 1);
            const montag = new Date(dCopy.setDate(diff));
            let tage = [];
            for(let i=0; i<7; i++) {
                const d = new Date(montag); d.setDate(montag.getDate() + i);
                tage.push(d.toISOString().split('T')[0]);
            }
            return tage;
        }

        window.wocheWechseln = function(diff) {
            fokusDatum.setDate(fokusDatum.getDate() + diff);
            window.ladeDashboard();
        };

        window.ladeDashboard = async function() {
            if(!aktuellerUser) return;
            const wochenTage = getWochenDaten(fokusDatum);
            document.getElementById('kw-anzeige').innerText = "Woche vom " + wochenTage[0];
            
            ['mo','di','mi','do','fr','sa','so'].forEach((id, i) => {
                const tageNamen = ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"];
                const el = document.getElementById(`th-${id}`);
                if(el) {
                    el.innerHTML = `${tageNamen[i]}<br><span class="font-normal text-[10px] text-gray-400">${wochenTage[i].split('-')[2]}.${wochenTage[i].split('-')[1]}.</span>`;
                }
            });

            try {
                const antwort = await fetch(`${API_URL}/planer/dashboard`);
                const daten = await antwort.json();

                const matrixBody = document.getElementById('matrix-body');
                if(!matrixBody) return;
                matrixBody.innerHTML = "";

                daten.mitarbeiter.forEach(m => {
                    let istErSelbst = m.toLowerCase() === aktuellerUser.toLowerCase();
                    let row = `<tr class="border-b ${istErSelbst ? 'bg-blue-50/30' : ''}">`;
                    row += `<td class="p-3 font-bold border-r bg-gray-50 sticky left-0 z-10">${m} ${istErSelbst ? '👤' : ''}</td>`;

                    wochenTage.forEach(tag => {
                        row += `<td class="p-2 border-r vertical-align-top min-w-[150px]">`;
                        let tagesElemente = [];

                        if(daten.wunschfrei) {
                            daten.wunschfrei.filter(w => w.mitarbeiter === m && w.datum === tag).forEach(w => {
                                tagesElemente.push({ typ: 'wunschfrei', von: w.von_uhrzeit, daten: w });
                            });
                        }
                        
                        daten.termine.filter(t => t.mitarbeiter === m && t.datum === tag).forEach(t => {
                            if (ansichtsModus === "PLAN" && t.status === 'FREIGEGEBEN') {
                                tagesElemente.push({ typ: 'termin', von: t.von_uhrzeit, daten: t });
                            } else if (ansichtsModus === "IST" && t.status === 'IST-ZEIT') {
                                tagesElemente.push({ typ: 'termin', von: t.von_uhrzeit, daten: t });
                            }
                        });

                        tagesElemente.sort((a, b) => a.von.localeCompare(b.von));

                        tagesElemente.forEach(item => {
                            if (item.typ === 'wunschfrei') {
                                const w = item.daten;
                                if (w.status === 'GENEHMIGT') {
                                    row += `<div class="border rounded-lg p-2 text-[10px] font-bold mb-2 bg-emerald-100 text-emerald-900 border-emerald-300">🛑 Frei: ${w.von_uhrzeit}-${w.bis_uhrzeit}</div>`;
                                }
                            } else if (item.typ === 'termin') {
                                const t = item.daten;
                                let statusColor = t.status === 'FREIGEGEBEN' ? 'bg-white border-emerald-400 text-emerald-950 font-semibold' : 'bg-orange-50 border-orange-400 text-orange-950 border-2 font-bold';

                                row += `
                                    <div class="border rounded-lg p-2 mb-2 text-[11px] ${statusColor}">
                                        <div class="font-bold flex justify-between"><span>${t.von_uhrzeit} - ${t.bis_uhrzeit}</span>
                                        ${(istErSelbst && t.status !== 'IST-ZEIT') ? `<button onclick="window.zeitVerschieben(${t.id}, '${t.von_uhrzeit}', '${t.bis_uhrzeit}')" class="text-orange-600 font-bold ml-1">📝</button>` : ''}</div>
                                        <div class="truncate mt-0.5">${t.kunde}</div>
                                    </div>`;
                            }
                        });
                        row += `</td>`;
                    });
                    row += `</tr>`;
                    matrixBody.innerHTML += row;
                });
            } catch(e) {
                console.error("Fehler beim Laden des Dashboards:", e);
            }
        };

        window.antragSenden = async function() {
            const datum = document.getElementById('frei-datum').value;
            const von_uhrzeit = document.getElementById('frei-von').value;
            const bis_uhrzeit = document.getElementById('frei-bis').value;
            const grund = document.getElementById('frei-grund').value;
            if(!datum) return alert("Bitte Datum wählen!");

            await fetch(`${API_URL}/mitarbeiter/wunschfrei`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mitarbeiter: aktuellerUser, datum, von_uhrzeit, bis_uhrzeit, grund })
            });

            alert("Wunschfrei-Antrag abgeschickt!");
            document.getElementById('frei-grund').value = "";
            window.ladeDashboard();
        };

        window.klientenWunschSenden = async function() {
            const kunde = document.getElementById('pool-kunde').value;
            const datum = document.getElementById('pool-datum').value;
            const von_uhrzeit = document.getElementById('pool-von').value;
            const bis_uhrzeit = document.getElementById('pool-bis').value;
            const notiz = document.getElementById('pool-notiz').value;

            if(!kunde || !datum) return alert("Bitte Klienten-Name und Datum eintragen!");

            await fetch(`${API_URL}/planer/klienten-wunsch`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    kunde, datum, von_uhrzeit, bis_uhrzeit, 
                    notiz: `Notiert von ${aktuellerUser}${notiz ? ': ' + notiz : ''}` 
                })
            });

            alert(`Wunsch für ${kunde} wurde an die Zentrale gesendet!`);
            document.getElementById('pool-kunde').value = "";
            document.getElementById('pool-notiz').value = "";
            window.ladeDashboard();
        };

        window.zeitVerschieben = async function(id, vUhr, bUhr) {
            const nVon = prompt("Neue Startzeit (HH:MM):", vUhr); if(!nVon) return;
            const nBis = prompt("Neue Endzeit (HH:MM):", bUhr); if(!nBis) return;
            await fetch(`${API_URL}/mitarbeiter/termin-verschieben/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ neueVonUhrzeit: nVon, neueBisUhrzeit: nBis })
            });
            window.ladeDashboard();
        };

        function ZeigeApp() {
            document.getElementById('login-block').classList.add('hidden');
            document.getElementById('app-block').classList.remove('hidden');
            document.getElementById('user-anzeige').innerText = aktuellerUser;
            window.ladeDashboard();
        }

        if(aktuellerUser) { 
            ZeigeApp(); 
        }
    </script>
</body>
</html>
