<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Cito Care Dienstplan</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="max-w-7xl mx-auto bg-white p-6 rounded shadow">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold">Dienstplan Übersicht</h1>
            <div id="debug-info" class="text-xs text-gray-500"></div> <button onclick="window.location.href='index.html'" class="bg-red-500 text-white px-4 py-2 rounded text-sm font-bold">Abmelden</button>
        </div>
        <div id="plan-container"></div>
    </div>

    <script>
        const meinName = (localStorage.getItem('mitarbeiterName') || "").trim().toLowerCase();
        document.getElementById('debug-info').innerText = "Eingeloggt als: " + meinName;

        // ... [Hier die Funktionen formatDate, getMontagVonWoche, getKwId einfügen wie gehabt] ...

        async function ladeUebersicht() {
            const res = await fetch('/api/planer/dashboard');
            const d = await res.json();
            
            // ... [Hier die Logik für tage und headerHtml einfügen wie gehabt] ...

            let bodyHtml = (d.mitarbeiterListe || []).map(m => {
                const dbName = m.name.trim().toLowerCase();
                const isOwner = (dbName === meinName);
                
                // WICHTIG: Wir bauen jetzt ein "Test-Div" ein, das uns den Vergleich zeigt
                let row = `<tr><td class="p-3 border">
                    <div class="font-bold">${m.name}</div>
                    <div class="text-[9px] text-gray-400">DB: ${dbName} | EIGEN: ${meinName}</div>
                </td>`;
                
                tage.forEach(t => {
                    const termin = (d.termine || []).find(x => x.mitarbeiter === m.name && x.datum === t);
                    if (!termin) {
                        row += `<td class="border p-2"></td>`;
                    } else {
                        let v = termin.hatAenderung ? termin.aktuell : (termin.original || {von: termin.von_uhrzeit || "00:00", bis: termin.bis_uhrzeit || "00:00"});
                        // DER BUTTON IST JETZT EINFACHER GESTEUERT
                        row += `<td class="border p-2 text-[10px]">
                            <b>${termin.kunde}</b><br>${v.von}-${v.bis}
                            ${isOwner ? `<button onclick="terminBearbeiten('${termin.id}', '${termin.datum}', '${v.von}', '${v.bis}')" class="bg-blue-600 text-white w-full rounded mt-1">Ändern</button>` : '<span class="text-gray-300 italic">Nicht änderbar</span>'}
                        </td>`;
                    }
                });
                return row + `</tr>`;
            }).join('');
            
            document.getElementById('plan-container').innerHTML = `<table class="w-full border-collapse border">${bodyHtml}</table>`;
        }

        // ... [Rest der Funktionen wie gehabt] ...
    </script>
</body>
</html>
