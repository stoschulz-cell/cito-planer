<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Termin bearbeiten</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h2 class="text-xl font-bold mb-6 text-blue-900 border-b pb-2">Termin bearbeiten</h2>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Kunde</label>
                <input type="text" id="edit-kunde" class="w-full border p-2 rounded">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Mitarbeiter</label>
                <select id="edit-ma" class="w-full border p-2 rounded"></select>
            </div>
            <div class="flex gap-4">
                <div class="w-1/2">
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Von</label>
                    <input type="time" id="edit-von" class="w-full border p-2 rounded">
                </div>
                <div class="w-1/2">
                    <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Bis</label>
                    <input type="time" id="edit-bis" class="w-full border p-2 rounded">
                </div>
            </div>
        </div>

        <div class="mt-8 flex flex-col gap-3">
            <button onclick="speichern()" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">Speichern</button>
            <button onclick="terminLoeschen()" class="w-full bg-red-100 text-red-600 py-2 rounded font-bold hover:bg-red-200">Termin löschen</button>
            <button onclick="window.close()" class="w-full bg-gray-300 text-gray-700 py-2 rounded font-bold hover:bg-gray-400">Abbrechen</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        async function ladeTermin() {
            try {
                const res = await fetch('/api/planer/dashboard');
                const data = await res.json();
                const termin = data.termine.find(t => t.id == id);
                
                if(termin) {
                    document.getElementById('edit-kunde').value = termin.kunde;
                    document.getElementById('edit-von').value = termin.aktuell?.von || termin.original.von;
                    document.getElementById('edit-bis').value = termin.aktuell?.bis || termin.original.bis;
                    
                    // Mitarbeiter-Liste füllen
                    const maSelect = document.getElementById('edit-ma');
                    maSelect.innerHTML = `<option value="Unbesetzt">Unbesetzt</option>` + 
                        data.mitarbeiterListe.map(m => `<option value="${m.name}" ${termin.mitarbeiter === m.name ? 'selected' : ''}>${m.name}</option>`).join('');
                }
            } catch (e) { console.error("Fehler beim Laden:", e); }
        }

        async function speichern() {
            const payload = {
                id: id,
                kunde: document.getElementById('edit-kunde').value,
                mitarbeiter: document.getElementById('edit-ma').value,
                von_uhrzeit: document.getElementById('edit-von').value,
                bis_uhrzeit: document.getElementById('edit-bis').value
            };

            const response = await fetch('/api/planer/termin/bearbeiten', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                if (window.opener && !window.opener.closed) window.opener.ladeDashboard();
                window.close();
            } else { alert("Fehler beim Speichern!"); }
        }

        async function terminLoeschen() {
            if(confirm("Diesen Termin wirklich löschen?")) {
                await fetch(`/api/planer/termin/${id}`, { method: 'DELETE' });
                if (window.opener && !window.opener.closed) window.opener.ladeDashboard();
                window.close();
            }
        }

        ladeTermin();
    </script>
</body>
</html>
